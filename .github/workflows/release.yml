name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 2.1, 2.2, 2.3)'
        required: true
        default: '2.1'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.1.2

      - name: Install dependencies
        run: pnpm install --ignore-scripts
        env:
          npm_config_ignore_scripts: "true"

      - name: Update version in manifest.json
        run: |
          jq --arg version "${{ github.event.inputs.version }}" '.version = $version' manifest.json > manifest.json.tmp
          mv manifest.json.tmp manifest.json

      - name: Update version in package.json
        run: |
          jq --arg version "${{ github.event.inputs.version }}" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Build plugin
        run: node esbuild.config.mjs production

      - name: Create release assets
        run: |
          mkdir -p release-assets
          cp main.js release-assets/
          cp manifest.json release-assets/
          cp styles.css release-assets/ 2>/dev/null || true
          cd release-assets && zip -r ../obsidian-library-linker-${{ github.event.inputs.version }}.zip . && cd ..

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git config --local core.hooksPath ""

      - name: Commit version bump
        run: |
          git add manifest.json package.json
          git commit -m "chore: bump version to ${{ github.event.inputs.version }}" --no-verify

      - name: Create git tag
        run: |
          git tag -a ${{ github.event.inputs.version }} -m "Release ${{ github.event.inputs.version }}"

      - name: Push changes and tag
        run: |
          git push origin main
          git push origin ${{ github.event.inputs.version }}

      - name: Generate release notes
        id: release_notes
        run: |
          COMMIT_LOG=$(git log $(git describe --tags --abbrev=0 HEAD~)..HEAD --pretty=format:"- %h: %s" 2>/dev/null || echo "Initial release")
          echo "release_body<<EOF" >> $GITHUB_OUTPUT
          echo "## Changes" >> $GITHUB_OUTPUT
          echo "$COMMIT_LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.version }}
          release_name: Release ${{ github.event.inputs.version }}
          body: |
            ## Obsidian Library Linker v${{ github.event.inputs.version }}
            
            ### Files Included
            - `main.js` - Plugin main file
            - `manifest.json` - Plugin manifest
            - `styles.css` - Plugin styles (if applicable)
            
            ### Installation
            Extract the contents of `obsidian-library-linker-${{ github.event.inputs.version }}.zip` to your Obsidian plugins folder.
            
            ${{ steps.release_notes.outputs.release_body }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./obsidian-library-linker-${{ github.event.inputs.version }}.zip
          asset_name: obsidian-library-linker-${{ github.event.inputs.version }}.zip
          asset_content_type: application/zip
